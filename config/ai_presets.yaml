# AI presets for RouterAI text generation.
# Verify model slugs at https://routerai.ru/models before deploy.

defaults:
  provider: routerai
  timeout_sec: 60
  max_tokens: 512
  temperature: 0.85

presets:
  fast:
    mode: single
    model: google/gemini-3.1-flash-lite
    post_process: rhythm_rewrite

  expert:
    mode: fusion
    parallel_experts: true
    experts:
      - google/gemini-3.1-flash-lite
      - z-ai/glm-5.2
    judge: z-ai/glm-5.2
    judge_prompt: |
      Сравни ответы экспертов. Выбери лучшее, исправь ошибки, верни финальный ответ.

  architect:
    mode: fusion_roles
    roles:
      GLM-5.2:
        model: z-ai/glm-5.2
        system: "Ты software architect. Предложи структуру решения."
      glm-5.2-dev:
        model: z-ai/glm-5.2
        system: "Ты ведущий разработчик. Найди проблемы в архитектуре."
      gemini-flash:
        model: google/gemini-3.1-flash-lite
        system: "Ты QA-инженер. Найди уязвимости и слабые места."
    judge:
      model: z-ai/glm-5.2
      system: "На основе мнений трёх экспертов сформируй итоговое решение."

  # Group dungeon (GD v1) only — wired via AI_PRESET_GD
  gd_narrative:
    mode: single
    model: google/gemini-3.1-flash-lite
    fallback_model: google/gemini-3.1-flash-lite
    post_process: none
