<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Магазин</title>
  <link rel="stylesheet" href="./styles.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="./app.js"></script>
  <style>
    /* ── SHOP-SPECIFIC OVERRIDES ────────────────────────────────── */
    body.page-shop {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #0f0c08;
    }

    /* ── STAGE: fills space between attic and bottom bars ── */
    .shop-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    /* Background gradient */
    .shop-stage-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(150deg, #2a1a08 0%, #15100a 55%, #0d0908 100%);
    }

    /* Optional WebP background image (loaded if available) */
    .shop-stage-bg-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
      pointer-events: none;
    }

    /* ── MERCHANT ── */
    .shop-merchant {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 108px;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .shop-merchant img {
      width: 108px;
      height: auto;
      display: block;
      object-fit: contain;
    }
    /* Fallback SVG shown when image not loaded */
    .shop-merchant-svg {
      width: 108px;
      height: auto;
      display: block;
    }
    /* Tap hint bubble icon */
    .shop-merchant::after {
      content: '💬';
      position: absolute;
      top: 8px; right: 2px;
      font-size: 16px;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }
    .shop-merchant:hover::after { opacity: .65; }

    /* ── DIALOG BUBBLE ── */
    .shop-dialog {
      /* Fixed, bottom-right of stage — above btabs, right of merchant */
      position: fixed;
      bottom: 116px; /* above btabs(~52px) + nav(~52px) + gap */
      left: 108px;   /* right of merchant column */
      right: 10px;
      background: rgba(255, 248, 215, .97);
      border: 2px solid #c8922a;
      border-radius: 14px;
      padding: 10px 12px 9px;
      z-index: 1100;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px) scale(.97);
      transition: opacity .22s ease, transform .22s ease;
    }
    .shop-dialog.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    /* Tail pointing DOWN-LEFT toward merchant body */
    .shop-dialog::before {
      content: '';
      position: absolute;
      bottom: -11px; left: 18px;
      border: 6px solid transparent;
      border-top-color: rgba(255, 248, 215, .97);
    }
    .shop-dialog::after {
      content: '';
      position: absolute;
      bottom: -15px; left: 16px;
      border: 7px solid transparent;
      border-top-color: #c8922a;
    }
    .shop-dialog-label {
      font-size: 9px;
      color: #8a5a1a;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .shop-dialog-text {
      font-size: 12px;
      color: #3a2010;
      line-height: 1.4;
      font-style: italic;
    }
    .shop-dialog-text b { color: #8a3010; font-style: normal; }
    /* Countdown bar */
    .shop-dialog-timer {
      height: 2px;
      background: rgba(200, 146, 42, .2);
      border-radius: 1px;
      margin-top: 7px;
      overflow: hidden;
    }
    .shop-dialog-timer-fill {
      height: 100%;
      background: #c8922a;
      border-radius: 1px;
      width: 100%;
      transition: width linear;
    }

    /* ── RIGHT COLUMN: items area ── */
    .shop-items-col {
      position: absolute;
      left: 106px; right: 0;
      top: 0; bottom: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      padding: 8px 6px 4px 4px;
      overflow-y: auto; /* scroll if items overflow on wide viewports */
    }

    /* ── ITEM GRID ── */
    .shop-items-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .shop-items-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 5px;
      align-content: stretch;
      min-height: 0;
    }

    /* ── ITEM CARD ── */
    .shop-item-card {
      background: rgba(20, 13, 6, .88);
      border: 1px solid rgba(200, 146, 42, .2);
      border-radius: 10px;
      padding: 3px 3px 5px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      transition: border-color .15s, background .15s;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .shop-item-card:active { background: rgba(46, 34, 18, .9); }
    .shop-item-card.rarity-uncommon { border-color: rgba(70, 190, 90, .45); }
    .shop-item-card.rarity-rare     { border-color: rgba(70, 130, 240, .5); }
    .shop-item-card.rarity-epic     { border-color: rgba(155, 70, 240, .55); }
    .shop-item-card.rarity-legendary { border-color: rgba(230, 180, 42, .7); }

    /* Silhouette icon — darkened/desaturated */
    .shop-item-icon {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: brightness(.38) saturate(.3);
    }
    .shop-item-icon img,
    .shop-item-icon svg {
      width: min(36px, 70%);
      height: auto;
    }

    /* Level badge top-left */
    .shop-item-level {
      position: absolute;
      top: 3px; left: 3px;
      background: rgba(0, 0, 0, .75);
      color: #aaa;
      font-size: 8.5px;
      font-weight: 700;
      padding: 1px 3px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .shop-item-card.rarity-uncommon  .shop-item-level { color: #60cc70; }
    .shop-item-card.rarity-rare      .shop-item-level { color: #7aadff; }
    .shop-item-card.rarity-epic      .shop-item-level { color: #c07aff; }
    .shop-item-card.rarity-legendary .shop-item-level { color: #f5c842; }

    .shop-item-name {
      font-size: 9px;
      color: #a09080;
      text-align: center;
      line-height: 1.15;
      padding: 0 2px;
    }
    .shop-item-price {
      font-size: 9.5px;
      color: #e8b84b;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* ── SELL PANEL ── */
    .shop-sell-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .shop-sell-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: 5px;
      align-content: start;
    }
    .shop-sell-card {
      background: rgba(20, 13, 6, .88);
      border: 1px solid rgba(200, 146, 42, .2);
      border-radius: 10px;
      padding: 3px 3px 5px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      transition: border-color .15s;
    }
    .shop-sell-card:hover { border-color: rgba(200, 60, 60, .45); }
    .shop-sell-price {
      font-size: 9.5px;
      color: #60cc70;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* ── GAMBLE PANEL ── */
    .shop-gamble-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .shop-gamble-orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c070ff, #6010bb 55%, #200840);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: shop-orb-pulse 3s ease-in-out infinite;
    }
    @keyframes shop-orb-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.07); }
    }
    .shop-gamble-orb svg { width: 34px; height: 34px; }
    .shop-gamble-title {
      font-size: 15px;
      font-weight: 700;
      color: #c080f0;
      font-family: var(--font-display, serif);
    }
    .shop-gamble-desc {
      font-size: 11px;
      color: #6a5a4a;
      text-align: center;
      line-height: 1.5;
    }
    .shop-gamble-btn {
      background: linear-gradient(135deg, #6010bb, #c070ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
    }
    .shop-gamble-cost {
      font-size: 10px;
      color: #c8922a;
    }

    /* ── BOTTOM TABS BAR ── */
    .shop-btabs-wrap {
      flex-shrink: 0;
      background: rgba(10, 7, 3, .97);
      border-top: 1px solid rgba(200, 146, 42, .12);
      padding: 5px 8px;
      z-index: 10;
      height: auto; /* prevent white gap */
    }
    .shop-btabs {
      display: flex;
      gap: 5px;
      background: rgba(22, 15, 7, .9);
      border: 1px solid rgba(200, 146, 42, .18);
      border-radius: 12px;
      padding: 4px;
    }
    .shop-btab {
      flex: 1;
      padding: 7px 4px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(200, 146, 42, .1);
      border-radius: 9px;
      color: #6a5a4a;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
    }
    .shop-btab.active {
      background: rgba(200, 146, 42, .18);
      border-color: rgba(200, 146, 42, .42);
      color: #e8b84b;
    }
    .shop-btab-sm {
      flex: 0 0 32px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(200, 146, 42, .1);
      border-radius: 9px;
      color: #6a5a4a;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shop-btab-sm.admin-only { display: none; }

    /* ── SHOP: force shared modal above merchant + btabs ── */
    body.page-shop .modal,
    body.page-shop [class*="modal"] {
      z-index: 1050 !important;
    }
    body.page-shop .modal-content,
    body.page-shop .modal-sheet {
      z-index: 1051 !important;
    }
  </style>
</head>

  <script>
  /* ════════════════════════════════════════════════════════════
     ShopPage — локальная логика страницы магазина
     Все данные берутся из WaifuApp (app.js).
     В демо-режиме — собственные заглушки.
  ════════════════════════════════════════════════════════════ */
  const ShopPage = (() => {

    // ── Иконки предметов (SVG-силуэты) ─────────────────────────
    const ITEM_ICONS = {
      sword:  `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14.5" y="3" width="3.5" height="19" rx="1.5" fill="#d0d0d0"/><rect x="9" y="19" width="14" height="3.5" rx="2" fill="#c8922a"/><rect x="13.5" y="22" width="5" height="7" rx="1.5" fill="#7a4a18"/><polygon points="16.2,3 14.5,3 13,8 19,8" fill="#e8e8e8"/></svg>`,
      dagger: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14.5" y="4" width="3" height="14" rx="1" fill="#d0d0d0"/><rect x="10" y="17" width="12" height="3" rx="1.5" fill="#c8922a"/><rect x="13.5" y="20" width="5" height="6" rx="1" fill="#6a3a10"/><polygon points="16,4 14.5,4 13,10 19,10" fill="#e8e8e8"/></svg>`,
      axe:    `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14.5" y="16" width="3.5" height="14" rx="1.5" fill="#7a4a18"/><path d="M12 4 Q6 10 12 18 L16.2 18 L19 18 Q25 10 19 4 Z" fill="#b0b0b0"/></svg>`,
      bow:    `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3 Q4 16 8 29" stroke="#7a4a18" stroke-width="4" fill="none" stroke-linecap="round"/><line x1="8" y1="3" x2="8" y2="29" stroke="#c8922a" stroke-width="1.5"/><line x1="8" y1="16" x2="24" y2="16" stroke="#c0c0c0" stroke-width="1.5"/><polygon points="24,13 28,16 24,19" fill="#c0c0c0"/></svg>`,
      staff:  `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14.5" y="8" width="3.5" height="22" rx="2" fill="#5a3008"/><circle cx="16.2" cy="7" r="6" fill="#6020aa" opacity=".9"/><circle cx="16.2" cy="7" r="4" fill="#9050e0"/><circle cx="15" cy="5.5" r="1.5" fill="#d0a0ff" opacity=".85"/></svg>`,
      shield: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 2 L28 7 L28 18 Q28 27 16 31 Q4 27 4 18 L4 7 Z" fill="#4a6a9a"/><path d="M16 6 L24 10 L24 18 Q24 25 16 28 Q8 25 8 18 L8 10 Z" fill="#3a5a8a"/><line x1="16" y1="6" x2="16" y2="28" stroke="#6a8ab0" stroke-width="1.5"/><line x1="8" y1="15" x2="24" y2="15" stroke="#6a8ab0" stroke-width="1.5"/></svg>`,
      armor:  `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 10 Q6 5 16 5 Q26 5 26 10 L26 24 Q26 30 16 30 Q6 30 6 24 Z" fill="#505060"/><path d="M10 10 Q10 7 16 7 Q22 7 22 10 L22 24 Q22 28 16 28 Q10 28 10 24 Z" fill="#404050"/><rect x="8" y="5" width="7" height="8" rx="2" fill="#606070"/><rect x="17" y="5" width="7" height="8" rx="2" fill="#606070"/><rect x="8" y="20" width="16" height="4" rx="1.5" fill="#707080"/></svg>`,
      ring:   `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="19" r="10" stroke="#c8922a" stroke-width="4" fill="none"/><circle cx="16" cy="9" r="5" fill="#b050e0"/><circle cx="16" cy="9" r="3" fill="#d080f0"/><circle cx="15" cy="8" r="1.2" fill="#fff" opacity=".8"/></svg>`,
      amulet: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="16" y1="2" x2="16" y2="11" stroke="#c8922a" stroke-width="2"/><path d="M7 9 Q7 2 16 2 Q25 2 25 9" stroke="#c8922a" stroke-width="2" fill="none"/><path d="M16 11 L22 20 L16 30 L10 20 Z" fill="#c8922a"/><path d="M16 13 L20 20 L16 28 L12 20 Z" fill="#e8b84b"/></svg>`,
    };

    // Маппинг subtype → иконка
    const SUBTYPE_ICON = {
      one_hand: 'sword', two_hand: 'axe', offhand: 'shield',
      bow: 'bow', staff: 'staff',
      light: 'armor', medium: 'armor', heavy: 'armor', robe: 'armor',
      ring: 'ring', amulet: 'amulet',
    };

    // Фразы торговца (fallback — до получения AI-ответа)
    const FALLBACK_BUBBLES = [
      'Советую <b>Доспех паладина</b>! Отменная защита для твоего уровня, странник.',
      'Сегодня завезли <b>Длинный меч</b> — редкий экземпляр. Разбирают быстро!',
      'Загляни на <b>Кольцо чемпиона</b> — говорят, приносит удачу в подземельях.',
      '<b>Кожаная броня</b> бесценна в первых актах. Сам пользовался, проверено!',
      'Шёпотом: <b>Амулет архимага</b> поднимает интеллект, как ничто другое.',
      'Осторожно с <b>Башенным щитом</b> — тяжёл, но надёжен как скала!',
    ];

    // ── Состояние ────────────────────────────────────────────────
    let dialogTimer = null;
    const DIALOG_MS = 5000;
    let activeTab = 'buy';

    // ── Dialog ───────────────────────────────────────────────────

    function onMerchantTap() {
      const dialog   = document.getElementById('shop-dialog');
      const textEl   = document.getElementById('shop-dialog-text');
      const fillEl   = document.getElementById('shop-dialog-timer-fill');

      // Try AI-generated text first (set by app.js after loadShop)
      const aiText = window.ShopPage._merchantAiText;
      textEl.innerHTML = aiText ||
        FALLBACK_BUBBLES[Math.floor(Math.random() * FALLBACK_BUBBLES.length)];

      // Reset & show
      fillEl.style.transition = 'none';
      fillEl.style.width = '100%';
      dialog.classList.add('show');

      // Start countdown
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fillEl.style.transition = `width ${DIALOG_MS}ms linear`;
          fillEl.style.width = '0%';
        });
      });

      clearTimeout(dialogTimer);
      dialogTimer = setTimeout(hideDialog, DIALOG_MS);
    }

    function hideDialog() {
      clearTimeout(dialogTimer);
      document.getElementById('shop-dialog').classList.remove('show');
    }

    // Tap anywhere on stage to dismiss
    document.getElementById('shop-stage').addEventListener('click', (e) => {
      if (!e.target.closest('#shop-merchant') &&
          document.getElementById('shop-dialog').classList.contains('show')) {
        hideDialog();
      }
    });

    // ── Tab switching ────────────────────────────────────────────

    function switchTab(tab) {
      activeTab = tab;
      ['buy', 'sell', 'gamble'].forEach(t => {
        const panel = document.getElementById(`shop-panel-${t}`);
        const btn   = document.getElementById(`shop-btab-${t}`);
        if (panel) panel.style.display = t === tab ? '' : 'none';
        if (btn)   btn.classList.toggle('active', t === tab);
      });
    }

    // ── Render buy grid ──────────────────────────────────────────

    function renderBuyGrid(items) {
      const grid = document.getElementById('shop-buy-grid');
      if (!items || items.length === 0) {
        grid.innerHTML = `<div class="placeholder muted tiny" style="grid-column:1/-1;text-align:center;padding:24px 0">Ассортимент пуст</div>`;
        return;
      }
      grid.innerHTML = items.map(item => {
        const iconKey = SUBTYPE_ICON[item.subtype] || item.item_type || 'sword';
        const icon    = ITEM_ICONS[iconKey] || ITEM_ICONS.sword;
        const rarity  = item.rarity || 'common';
        return `
          <div class="shop-item-card rarity-${rarity}"
               onclick="WaifuApp.openShopItemModal(${item.id})"
               data-item-id="${item.id}">
            <div class="shop-item-level">${item.level}</div>
            <div class="shop-item-icon">${icon}</div>
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-item-price">
              <svg style="width:10px;height:10px;flex-shrink:0" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                <circle cx="5" cy="5" r="4.5" fill="#c8922a"/>
                <text x="5" y="7.5" text-anchor="middle" font-size="5.5" fill="#e8b84b" font-weight="bold">G</text>
              </svg>
              ${item.price.toLocaleString()}
            </div>
          </div>`;
      }).join('');
    }

    // ── Render sell grid ─────────────────────────────────────────

    function renderSellGrid(items) {
      const grid = document.getElementById('shop-sell-grid');
      if (!items || items.length === 0) {
        grid.innerHTML = `<div class="placeholder muted tiny" style="grid-column:1/-1;text-align:center;padding:24px 0">Нет предметов для продажи</div>`;
        return;
      }
      grid.innerHTML = items.map(item => {
        const iconKey = SUBTYPE_ICON[item.subtype] || item.item_type || 'sword';
        const icon    = ITEM_ICONS[iconKey] || ITEM_ICONS.sword;
        return `
          <div class="shop-sell-card"
               onclick="WaifuApp.openShopSellModal(${item.id})"
               data-item-id="${item.id}">
            <div class="shop-item-icon" style="filter:brightness(.38) saturate(.3)">${icon}</div>
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-sell-price">
              <svg style="width:10px;height:10px;flex-shrink:0" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                <circle cx="5" cy="5" r="4.5" fill="#c8922a"/>
                <text x="5" y="7.5" text-anchor="middle" font-size="5.5" fill="#e8b84b" font-weight="bold">G</text>
              </svg>
              ${item.sell_price.toLocaleString()}
            </div>
          </div>`;
      }).join('');
    }

    // ── AI merchant text (set by app.js after API call) ──────────
    // app.js calls: ShopPage.setMerchantText(aiText)
    function setMerchantText(text) {
      window.ShopPage._merchantAiText = text;
    }

    // ── Public API ───────────────────────────────────────────────
    return {
      onMerchantTap,
      hideDialog,
      switchTab,
      renderBuyGrid,
      renderSellGrid,
      setMerchantText,
      _merchantAiText: null,
    };
  })();
  </script>

</body>
</html>
