<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка Навыка: Боевой клич</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="skill-card-container">
        <div class="skill-card">
            
            <div class="card-header">
                <h1 class="card-title">Боевой клич</h1>
                <div class="tier-label">Тир 1</div>
            </div>

            <div class="card-main-content">
                <div class="main-icon-container">
                    <img src="images/icon_shield_horn.png" alt="Иконка навыка Боевой клич" class="main-icon">
                </div>
                
                <div class="stars-container">
                    <img src="images/star_empty.png" alt="Пустая звезда" class="star">
                    <img src="images/star_empty.png" alt="Пустая звезда" class="star">
                    <img src="images/star_empty.png" alt="Пустая звезда" class="star">
                </div>
            </div>

            <div class="effect-description">
                <h2 class="effect-title">ОПИСАНИЕ ЭФФЕКТА:</h2>
                <p class="effect-text">
                    При активации навыка: бонус к урону (+0.83%) применяется ко всем участникам гильдии, находящимся онлайн в течение следующих 10 минут.
                </p>
            </div>

            <button class="upgrade-button">
                <div class="upgrade-cost">
                    <img src="images/icon_currency.png" alt="Иконка валюты" class="currency-icon">
                    <span class="cost-text">+1 ОПГ (1)</span>
                </div>
                <div class="upgrade-action">
                    <span class="action-arrow">→</span>
                    <span class="action-text">Улучшить</span>
                </div>
            </button>

        </div>
    </div>

</body>
</html>
