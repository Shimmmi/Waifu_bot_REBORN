# Telegram Mini App: /webapp/ + /static/ locations for waifu-bot nginx site.
# On production, merge into /etc/nginx/sites-available/waifu-bot (inside server { listen 443 ... }).
# Do NOT add X-Frame-Options here — it blocks Telegram Desktop iframe embedding.
# After edit: sudo nginx -t && sudo systemctl reload nginx
#
# ---------------------------------------------------------------------------
# Compression. Put these in the http{} or server{} block (NOT inside location).
# gzip is built-in; brotli requires the ngx_brotli module (apt install
# libnginx-mod-http-brotli, or build from google/ngx_brotli). If brotli is not
# available, gzip alone still cuts text payloads ~60-70%.
# ---------------------------------------------------------------------------
#   gzip              on;
#   gzip_comp_level   6;
#   gzip_min_length   1024;
#   gzip_vary         on;
#   gzip_proxied      any;
#   gzip_types        application/javascript application/json text/css text/html
#                     image/svg+xml application/manifest+json font/ttf font/otf;
#
#   brotli            on;        # requires ngx_brotli
#   brotli_comp_level 5;
#   brotli_types      application/javascript application/json text/css text/html
#                     image/svg+xml application/manifest+json font/ttf font/otf;
# ---------------------------------------------------------------------------

    # HTML entry documents: never cache — they bump the ?v= version of every
    # asset, so they must always be fetched fresh.
    location ~* ^/webapp/(.+\.html)$ {
        alias /opt/waifu-bot-REBORN/src/waifu_bot/webapp/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org https://oauth.telegram.org https://telegram.org" always;
        add_header X-Cache-Status "BYPASS" always;
    }

    # Service worker: must revalidate so new deploys take effect quickly.
    # Browsers already bypass HTTP cache for the SW script, keep it explicit.
    location = /webapp/sw.js {
        alias /opt/waifu-bot-REBORN/src/waifu_bot/webapp/sw.js;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Unversioned shell scripts/styles (vendor SDK, tutorial) are loaded WITHOUT
    # a ?v= query, so they must NOT be immutable. Cache for a day with ETag
    # revalidation. Listed before the immutable JS/CSS rule (first regex wins).
    location ~* ^/webapp/((?:vendor|assets)/.+\.(?:js|css))$ {
        alias /opt/waifu-bot-REBORN/src/waifu_bot/webapp/$1;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org https://oauth.telegram.org https://telegram.org" always;
    }

    # Versioned JS/CSS bundles + root shell. All of these are requested with
    # ?v=waifu-webapp-vNN, so a long immutable cache is safe: a new deploy
    # changes the query string and busts the cache automatically.
    location ~* ^/webapp/(.+\.(?:js|mjs|css))$ {
        alias /opt/waifu-bot-REBORN/src/waifu_bot/webapp/$1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org https://oauth.telegram.org https://telegram.org" always;
    }

    # Other /webapp/ assets (images, fonts, audio, manifest, etc.).
    location /webapp/ {
        alias /opt/waifu-bot-REBORN/src/waifu_bot/webapp/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org https://oauth.telegram.org https://telegram.org" always;
    }

    # Game static assets (sprites, item/waifu webp, ui, audio). These are
    # content-addressed by path and effectively immutable; they were previously
    # served with no-store, forcing a full re-download on every navigation.
    location /static/game/ {
        alias /opt/waifu-bot-REBORN/static/game/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Missing art is common (optional tiers/skins); these 404 naturally and
        # we keep them out of the access log to reduce noise.
        access_log off;
    }

    # Remaining /static/ assets (guild banners/icons, avatars, tracks). User
    # generated; cache for a day with revalidation rather than forever.
    location /static/ {
        alias /opt/waifu-bot-REBORN/static/;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
