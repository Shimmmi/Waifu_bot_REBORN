<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waifu REBORN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=waifu-webapp-v59" />
    <style>
      .title-screen-load-fail-title {
        font-weight: 700;
        margin: 0 0 8px;
      }
      .title-screen-load-fail-msg {
        margin: 0 0 6px;
        word-break: break-word;
      }
    </style>
    <link rel="stylesheet" href="./assets/tutorial.css" />
    <script defer src="./vendor/telegram-web-app.js"></script>
    <script defer src="./assets/tutorial.js"></script>
    <script defer src="./app.js?v=waifu-webapp-v59"></script>
  </head>
  <body class="page-title-screen" onload="WaifuApp.bootstrapPage('index', WaifuApp.initTitleScreen);">
    <div class="title-screen-bg" aria-hidden="true"></div>
    <div class="title-screen-scrim" aria-hidden="true"></div>

    <main class="title-screen-main">
      <noscript>
        <p class="title-screen-noscript muted">Включите JavaScript или откройте <a href="./profile.html">profile.html</a>.</p>
      </noscript>

      <div id="title-screen-auth" class="title-screen-auth muted tiny" style="display: none"></div>

      <nav class="title-screen-menu" aria-label="Главное меню">
        <button type="button" id="title-primary-btn" class="title-screen-btn" disabled>
          …
        </button>
        <a class="title-screen-btn" href="./player.html">Профиль</a>
        <button type="button" id="title-info-btn" class="title-screen-btn">Информация</button>
      </nav>
    </main>

    <div id="title-info-modal" class="title-screen-modal" role="dialog" aria-modal="true" aria-labelledby="title-info-heading" hidden>
      <div class="title-screen-modal-panel">
        <h2 id="title-info-heading" class="title-screen-modal-title">О игре</h2>
        <p class="title-screen-modal-text">
          Waifu REBORN — веб-игра в Telegram: основная вайфу, подземелья, магазин, таверна с наёмницами, караван по актам,
          пассивные навыки и групповые походы. Откройте разделы через нижнее меню после входа в игру.
        </p>
        <button type="button" id="title-info-close" class="title-screen-btn">Закрыть</button>
      </div>
    </div>
  </body>
</html>
