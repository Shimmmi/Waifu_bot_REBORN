<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Битва</title>
    <link rel="stylesheet" href="./styles.css?v=waifu-webapp-v33" />
    <script src="./vendor/telegram-web-app.js"></script>
    <script defer src="./app.js?v=waifu-webapp-v33"></script>
  </head>
  <body onload="WaifuApp.bootstrapPage('battle',()=>WaifuApp.loadBattle());">
    <div class="screen">
      <header class="attic">
        <div class="attic-row" aria-label="Основной чердак">
          <button type="button" class="attic-player-avatar" id="attic-player-avatar" aria-label="Профиль игрока" title="Профиль игрока">
            <img id="attic-player-avatar-img" alt="" hidden />
            <span class="attic-player-avatar-fallback" id="attic-player-avatar-fallback"></span>
            <span class="attic-player-mail-badge" id="attic-player-mail-badge" hidden aria-hidden="true"></span>
          </button>
          <div class="chip attic-level-chip" title="Уровень основной вайфу">
            <div class="attic-level-top">⭐&nbsp;<strong id="badge-level">—</strong></div>
            <div class="attic-xp-bar"><div class="attic-xp-fill" id="attic-xp-fill"></div></div>
          </div>
          <div class="chip chip-ghost" id="attic-dungeon-chip" title="Активное подземелье (нажми — одиночные)">
            <span id="attic-dungeon-label">Нет боя</span>
            <div id="attic-dungeon-progress" class="attic-dungeon-progress" hidden>
              <div class="attic-dungeon-progress-track">
                <div class="attic-dungeon-progress-fill" id="attic-dungeon-progress-fill"></div>
              </div>
            </div>
          </div>
          <div class="chip chip-ghost" id="attic-expedition-chip" title="Активные экспедиции (нажми — вкладка Экспедиции)"></div>
          <div class="chip" title="Золото">🪙&nbsp;<strong id="badge-gold">—</strong></div>
        </div>
      </header>

      <main class="battle-screen">
        <div class="battle-header">
          <h2 id="battle-title">БИТВА: Загрузка...</h2>
        </div>
        <p class="battle-story-narrative muted tiny" id="battle-story-narrative" style="display: none" aria-live="polite"></p>

        <!-- Противник -->
        <div class="battle-enemy">
          <h3 id="enemy-name">ПРОТИВНИК: Загрузка...</h3>
          <div class="battle-card enemy-card">
            <div class="battle-hp-bar">
              <div class="hp-bar-fill" id="enemy-hp-fill" style="width: 100%;"></div>
              <div class="hp-bar-text" id="enemy-hp-text">HP: 100/100</div>
            </div>
            <div class="battle-image" id="enemy-image">👹</div>
            <div class="battle-stats">
              <div class="muted tiny" id="enemy-stats">Атака: — | Защита: — | Тип: —</div>
            </div>
          </div>
        </div>

        <!-- Ваша вайфу -->
        <div class="battle-waifu">
          <h3 id="waifu-battle-name">ВАША ВАЙФУ: Загрузка...</h3>
          <div class="battle-card waifu-card">
            <div class="battle-hp-bar">
              <div class="hp-bar-fill" id="waifu-hp-fill" style="width: 100%;"></div>
              <div class="hp-bar-text" id="waifu-hp-text">HP: 100/100</div>
            </div>
            <div class="battle-image" id="waifu-image">👤</div>
            <div class="battle-stats">
              <div class="muted tiny" id="waifu-stats">Атака: — | Защита: —</div>
            </div>
          </div>
        </div>

        <!-- Лог боя -->
        <div class="battle-log">
          <div class="battle-log-header">Боевой лог</div>
          <div class="battle-log-content" id="battle-log-content">
            <div class="muted tiny">Битва начата...</div>
          </div>
        </div>

        <!-- Кнопки управления -->
        <div class="battle-controls">
          <button class="btn" id="battle-continue-btn" onclick="WaifuApp.continueBattle()">Продолжить битву</button>
          <button class="btn btn-secondary" onclick="WaifuApp.exitBattle()">Выйти из битвы</button>
        </div>
      </main>

      <nav class="nav basement">
        <a href="./profile.html" data-page="profile" title="Профиль"><span aria-hidden="true">👤</span></a>
        <a href="./dungeons.html" data-page="dungeons" title="Подземелья"><span aria-hidden="true">🏰</span></a>
        <a href="./shop.html" data-page="shop" title="Магазин"><span aria-hidden="true">🏪</span></a>
        <a href="./tavern.html" data-page="tavern" title="Таверна"><span aria-hidden="true">🍻</span></a>
        <a href="./caravan.html" data-page="caravan" title="Караван"><span aria-hidden="true">🐫</span></a>
        <a href="./guild_hall.html" data-page="guild" title="Гильдия"><span aria-hidden="true">🏛️</span></a>
        <a href="./training_hall.html" data-page="training" title="Тренировочный зал"><span aria-hidden="true">💪</span></a>
        <a href="./index.html" data-page="menu" title="Главное меню"><span aria-hidden="true">🏠</span></a>
      </nav>
    </div>
  </body>
</html>
