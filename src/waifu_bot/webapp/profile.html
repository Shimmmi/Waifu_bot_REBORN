<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль вайфу</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body class="page-profile" onload="WaifuApp.bootstrapPage('profile', WaifuApp.populateProfile);">
    <header class="attic">
      <div class="attic-row" aria-label="Основной чердак">
        <div class="chip attic-level-chip" title="Уровень и опыт">
          <div class="attic-level-top">⭐&nbsp;<strong id="badge-level">—</strong></div>
          <div class="attic-xp-bar"><div class="attic-xp-fill" id="attic-xp-fill"></div></div>
        </div>
        <div class="chip chip-ghost" id="attic-dungeon-chip" title="Активное подземелье">🏰&nbsp;<span id="attic-dungeon-label">Нет боя</span></div>
        <div class="chip chip-ghost" id="attic-expedition-chip" title="Активные экспедиции">🗺&nbsp;<span id="attic-expedition-label"></span></div>
        <div class="chip" title="Золото">🪙&nbsp;<strong id="badge-gold">—</strong></div>
        <div class="chip" title="Энергия">⚡&nbsp;<span id="badge-energy">—</span></div>
      </div>
    </header>

    <main class="layout profile-layout">
      <div class="tabs profile-tabs">
        <button class="tab active" data-tab="profile" onclick="WaifuApp.switchProfileTab('profile')">Профиль</button>
        <button class="tab" data-tab="inventory" onclick="WaifuApp.switchProfileTab('inventory')">Инвентарь</button>
        <button class="tab" data-tab="info" onclick="WaifuApp.switchProfileTab('info')">Подробно</button>
        <button class="tab tab-reset" title="Сбросить вайфу" aria-label="Сбросить вайфу" onclick="WaifuApp.resetMainWaifu()">♻️</button>
      </div>

      <section id="tab-profile" class="tab-panel active">
        <div class="section profile-hero">
          <div class="profile-portrait-card">
            <div class="profile-portrait-frame">
              <div id="profile-portrait-media" class="profile-portrait-media" aria-label="Портрет основной вайфу">👤</div>
              <div class="profile-portrait-overlay">
                <strong id="profile-portrait-name">—</strong>
                <span id="profile-portrait-race">—</span>
                <span id="profile-portrait-class">—</span>
              </div>
            </div>
          </div>

          <div class="profile-summary-column">
            <div class="profile-stats-list" id="profile-stats-strip" aria-label="Основные характеристики"></div>

            <div class="profile-hero-bars">
              <div class="profile-resource-card" aria-label="Здоровье">
                <div class="profile-resource-row">
                  <span class="muted tiny">HP</span>
                  <strong id="profile-hp-text">—</strong>
                </div>
                <div class="xp-bar" aria-hidden="true">
                  <div class="xp-bar-fill hp-bar-fill" id="profile-hp-fill" style="width:0%"></div>
                </div>
              </div>

              <div class="profile-resource-card profile-xp" aria-label="Опыт">
                <div class="profile-resource-row">
                  <span class="muted tiny">EXP</span>
                  <strong id="profile-xp-text">—</strong>
                </div>
                <div class="xp-bar" aria-hidden="true">
                  <div class="xp-bar-fill" id="profile-xp-fill" style="width:0%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-inventory" class="tab-panel">
        <!-- Toggle button -->
        <button id="profile-view-toggle" class="inv-toggle-btn" onclick="WaifuApp.toggleProfileInventoryMode()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1"/>
            <rect x="9" y="1" width="6" height="6" rx="1"/>
            <rect x="1" y="9" width="6" height="6" rx="1"/>
            <rect x="9" y="9" width="6" height="6" rx="1"/>
          </svg>
          <span id="profile-gear-mode-badge">Компактный режим</span>
        </button>

        <!-- Equipment (JS renders content here) -->
        <div id="profile-gear" class="profile-gear-layout placeholder">Загрузка экипировки...</div>

        <!-- Bag section -->
        <div class="inv-bag-wrap">
          <!-- Filter + sort in one compact row -->
          <div class="inv-bag-controls">
            <button class="inv-filter-btn active" id="profile-filter-weapon" onclick="WaifuApp.toggleProfileInventoryFilter('weapon')">⚔ Оружие</button>
            <button class="inv-filter-btn active" id="profile-filter-armor" onclick="WaifuApp.toggleProfileInventoryFilter('armor')">🛡 Броня</button>
            <button class="inv-filter-btn active" id="profile-filter-accessory" onclick="WaifuApp.toggleProfileInventoryFilter('accessory')">💍 Акс.</button>
            <div class="inv-sort-wrap">
              <select id="profile-sort-select" class="inv-sort-select" onchange="WaifuApp.setProfileInventorySort(this.value)">
                <option value="level">Ур.</option>
                <option value="rarity">Ред.</option>
                <option value="equipability">Надеть</option>
              </select>
              <button id="profile-sort-direction" class="inv-sort-dir" onclick="WaifuApp.toggleProfileInventorySortDir()">▼</button>
            </div>
          </div>

          <!-- Bag grid (JS renders content here) -->
          <div id="profile-inventory" class="profile-bag-grid placeholder">Загрузка...</div>

          <!-- Pagination + capacity -->
          <div class="inv-pagination">
            <button class="secondary" id="profile-page-prev" onclick="WaifuApp.changeProfileInventoryPage(-1)">‹</button>
            <span class="tag" id="profile-page-status">—</span>
            <button class="secondary" id="profile-page-next" onclick="WaifuApp.changeProfileInventoryPage(1)">›</button>
            <span class="tag" id="profile-bag-capacity">—</span>
          </div>
          <div class="muted tiny inv-bag-summary" id="profile-inventory-summary"></div>
        </div>
      </section>

      <section id="tab-info" class="tab-panel">
        <div class="section">
          <div class="section-head">
            <h3>Характеристики</h3>
            <div class="tag" id="profile-stat-points">ОХ: —</div>
          </div>
          <div id="profile-stats-breakdown" class="profile-stat-accordions"></div>
        </div>

        <div class="section">
          <div class="profile-inner-tabs">
            <button class="tab active" data-info-tab="indicators" onclick="WaifuApp.switchProfileInfoTab('indicators')">Показатели</button>
            <button class="tab" data-info-tab="statistics" onclick="WaifuApp.switchProfileInfoTab('statistics')">Статистика</button>
          </div>

          <div id="profile-info-indicators" class="profile-info-panel active">
            <div id="profile-indicators-grid" class="details-grid"></div>
          </div>

          <div id="profile-info-statistics" class="profile-info-panel">
            <div id="profile-statistics-grid" class="details-grid"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="slot-modal" class="modal" style="display:none;" onclick="if (event.target === this) WaifuApp.closeSlotModal()">
      <div class="modal-content">
        <div class="modal-head">
          <div>
            <div class="modal-title" id="slot-modal-title">Выберите предмет</div>
            <div class="muted tiny" id="slot-modal-subtitle">—</div>
          </div>
          <button class="secondary" onclick="WaifuApp.closeSlotModal()">✖</button>
        </div>
        <div class="modal-body" id="slot-modal-body">
          <div class="placeholder">Загрузка...</div>
        </div>
        <div class="modal-footer">
          <button class="secondary" onclick="WaifuApp.closeSlotModal()">Отмена</button>
        </div>
      </div>
    </div>

    <div id="item-modal" class="modal" style="display:none;" onclick="if (event.target === this) WaifuApp.closeItemModal()">
      <div class="modal-content" id="item-modal-content">
        <div class="modal-head">
          <div class="profile-item-modal-titlebox">
            <div class="muted tiny" id="item-modal-rarity">—</div>
            <div class="modal-title" id="item-modal-name">—</div>
          </div>
          <button class="secondary" onclick="WaifuApp.closeItemModal()">✖</button>
        </div>
        <div class="modal-body">
          <div class="profile-item-modal-layout">
            <div class="item-modal-art profile-item-modal-art" id="item-modal-art" aria-hidden="true">📦</div>
            <div class="profile-item-modal-side">
              <div class="detail-row">
                <span class="muted">Уровень</span>
                <strong id="item-modal-level">—</strong>
              </div>
              <div class="detail-row">
                <span class="muted">Тип</span>
                <strong id="item-modal-type">—</strong>
              </div>
              <div class="detail-row">
                <span class="muted">Слот</span>
                <strong id="item-modal-slot">—</strong>
              </div>
            </div>
          </div>
          <div id="item-modal-body"></div>
        </div>
        <div class="modal-footer">
          <button class="secondary danger" id="item-modal-sell" onclick="WaifuApp.toggleItemSellConfirm()" style="display:none;">Продать</button>
          <button class="secondary" id="item-modal-unequip" onclick="WaifuApp.unequipItemFromModal()" style="display:none;">Снять</button>
          <button class="secondary" id="item-modal-replace" onclick="WaifuApp.openProfileSlotReplacementFromModal()" style="display:none;">Заменить</button>
          <button class="primary" id="item-modal-equip" onclick="WaifuApp.equipItemFromModal()" style="display:none;">Экипировать</button>
          <button class="secondary" onclick="WaifuApp.closeItemModal()">Закрыть</button>
        </div>
      </div>
    </div>

    <nav class="nav basement">
      <a href="./profile.html" data-page="profile" title="Профиль"><span aria-hidden="true">👤</span></a>
      <a href="./dungeons.html" data-page="dungeons" title="Подземелья"><span aria-hidden="true">🏰</span></a>
      <a href="./shop.html" data-page="shop" title="Магазин"><span aria-hidden="true">🏪</span></a>
      <a href="./tavern.html" data-page="tavern" title="Таверна"><span aria-hidden="true">🍻</span></a>
      <a href="./caravan.html" data-page="caravan" title="Караван"><span aria-hidden="true">🐫</span></a>
      <a href="./guild_hall.html" data-page="guild" title="Гильдия"><span aria-hidden="true">🏛️</span></a>
      <a href="./training_hall.html" data-page="training" title="Тренировочный зал"><span aria-hidden="true">💪</span></a>
      <a href="./settings.html" data-page="settings" title="Настройки"><span aria-hidden="true">⚙️</span></a>
    </nav>
  </body>
</html>
