<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренировочный зал</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --ink: #0d0a08;
        --surface: #1f1814;
        --amber: #c8922a;
        --amber-glow: #f4d078;
        --ash: #b5a896;
        --cream: #f3ebe0;
      }
      /* Единая светлая типографика на тёмном фоне (в т.ч. при theme-light от Telegram — иначе --text становится тёмным). */
      body.page-training {
        --text: #f3ebe0;
        --muted: #c9baa8;
        --accent: #f0c565;
        --border: rgba(200, 146, 42, 0.3);
        --card: rgba(36, 28, 22, 0.92);
        background: var(--ink);
        color: var(--text);
        padding-bottom: 120px;
      }
      body.page-training .layout {
        max-width: none;
        width: 100%;
        margin: 0 auto;
        padding: 10px 10px 24px;
      }
      body.page-training .section {
        background: var(--surface);
        border: 1px solid rgba(200, 146, 42, 0.15);
        color: var(--text);
      }
      body.page-training .muted {
        color: var(--muted) !important;
      }
      body.page-training .passive-tabs-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      body.page-training .passive-free-pts-wrap {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      body.page-training #passive-free-pts {
        font-size: 15px;
        font-weight: 800;
        color: var(--amber-glow);
      }
      body.page-training .passive-admin-max-btn {
        margin-left: 6px;
        padding: 2px 8px;
        font-size: 16px;
        line-height: 1;
        border: 1px solid rgba(200, 146, 42, 0.45);
        border-radius: 8px;
        background: rgba(200, 146, 42, 0.12);
        color: var(--amber-glow);
        cursor: pointer;
      }
      body.page-training .passive-admin-max-btn:hover {
        border-color: var(--amber-glow);
        background: rgba(200, 146, 42, 0.22);
      }
      body.page-training .passive-admin-max-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      body.page-training .passive-tab {
        color: rgba(243, 235, 224, 0.82);
      }
      body.page-training .passive-tab.active {
        color: var(--amber-glow);
      }
      body.page-training .section-head {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
        color: var(--amber-glow);
      }
      body.page-training .modal-content {
        background: var(--surface);
        color: var(--text);
        border-color: rgba(200, 146, 42, 0.22);
      }
      body.page-training .modal-title {
        color: var(--text);
      }
      body.page-training .passive-modal-x {
        border: none;
        background: transparent;
        color: var(--ash, #8a7a6a);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 8px;
      }
      body.page-training .passive-modal-x:hover {
        color: var(--amber-glow);
        background: rgba(200, 146, 42, 0.12);
      }
      body.page-training .hidden-skill-card {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(200, 146, 42, 0.15);
        color: var(--text);
      }
      body.page-training .hidden-skill-card-lv {
        color: var(--muted);
      }
      body.page-training .passive-reset-btn {
        border-color: rgba(200, 146, 42, 0.45);
        background: rgba(200, 146, 42, 0.1);
        color: var(--text);
      }
      body.page-training .passive-reset-btn:hover {
        border-color: var(--amber-glow);
        color: var(--amber-glow);
      }
      body.page-training #passive-tree-root {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
      }
      body.page-training .passive-tab--help {
        min-width: 44px;
        justify-content: center;
      }
      body.page-training .passive-tab-ico--q {
        font-size: 18px;
        font-weight: 900;
        font-family: system-ui, sans-serif;
        line-height: 1;
      }
      body.page-training #training-hidden-view .section-head {
        margin-top: 0;
      }
      body.page-training .nav.basement a {
        color: #d8cbb8 !important;
      }
      body.page-training .nav.basement a:hover {
        color: #f4d078 !important;
      }
      body.page-training .nav.basement a.active {
        color: #ffe8a8 !important;
      }
    </style>
    <link rel="stylesheet" href="./assets/tutorial.css" />
    <script src="./vendor/telegram-web-app.js"></script>
    <script defer src="./assets/tutorial.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body class="page-training" onload="WaifuApp.bootstrapPage('training', WaifuApp.populateTrainingHall);">
    <header class="attic">
      <div class="attic-row" aria-label="Основной чердак">
        <div class="chip attic-level-chip" title="Уровень и опыт">
          <div class="attic-level-top">⭐&nbsp;<strong id="badge-level">—</strong></div>
          <div class="attic-xp-bar"><div class="attic-xp-fill" id="attic-xp-fill"></div></div>
        </div>
        <div class="chip chip-ghost" id="attic-dungeon-chip" title="Активное подземелье (нажми — одиночные)">
          <span id="attic-dungeon-label">Нет боя</span>
          <div id="attic-dungeon-progress" class="attic-dungeon-progress" hidden>
            <div class="attic-dungeon-progress-track">
              <div class="attic-dungeon-progress-fill" id="attic-dungeon-progress-fill"></div>
            </div>
          </div>
        </div>
        <div class="chip chip-ghost" id="attic-expedition-chip" title="Активные экспедиции (нажми — вкладка Экспедиции)"></div>
        <div class="chip" title="Золото">🪙&nbsp;<strong id="badge-gold">—</strong></div>
      </div>
    </header>

    <main class="layout">
      <section class="section passive-skills-section" id="passive-skills-section">
        <div class="passive-tabs-row" data-tutorial="training-points" aria-label="Ветки и свободные очки">
          <div class="passive-tabs" role="tablist" aria-label="Пассивные и скрытые навыки">
            <button type="button" class="passive-tab active" data-training-tab="warrior" role="tab" aria-selected="true">
              <span class="passive-tab-text" id="passive-tab-label-warrior">Воин 0</span>
            </button>
            <button type="button" class="passive-tab" data-training-tab="shadow" role="tab" aria-selected="false">
              <span class="passive-tab-text" id="passive-tab-label-shadow">Тень 0</span>
            </button>
            <button type="button" class="passive-tab" data-training-tab="sage" role="tab" aria-selected="false">
              <span class="passive-tab-text" id="passive-tab-label-sage">Мудрец 0</span>
            </button>
            <button
              type="button"
              class="passive-tab passive-tab--help"
              data-training-tab="hidden"
              role="tab"
              aria-selected="false"
              aria-label="Скрытые навыки"
              title="Скрытые навыки"
            >
              <span class="passive-tab-ico passive-tab-ico--q" aria-hidden="true">?</span>
            </button>
          </div>
          <div class="passive-free-pts-wrap" id="passive-free-pts-wrap" hidden>
            <strong id="passive-free-pts" title="Свободные очки навыков">0</strong>
            <button
              type="button"
              id="passive-admin-max-all"
              class="passive-admin-max-btn"
              hidden
              aria-label="Прокачать все пассивы (админ QA)"
              title="Прокачать все пассивы (админ QA)"
            >
              ⏫
            </button>
          </div>
        </div>
        <div id="training-passive-view">
          <div id="passive-tree-root" class="passive-tree-root placeholder" data-tutorial="training-tree">Загрузка дерева…</div>
          <button type="button" class="btn passive-reset-btn" id="passive-reset-branch">
            Сбросить очки текущей ветки
          </button>
        </div>
        <div id="training-hidden-view" hidden>
          <h3 class="section-head">Скрытые навыки</h3>
          <div id="hidden-skills-root" class="hidden-skills-grid placeholder">Загрузка…</div>
        </div>
      </section>
    </main>

    <div
      id="passive-skill-modal"
      class="modal"
      style="display: none"
      onclick="if (event.target === this) WaifuApp.closePassiveSkillModal()"
    >
      <div class="modal-content passive-skill-modal-panel" onclick="event.stopPropagation()">
        <div class="modal-head passive-modal-head--skill">
          <div class="modal-title passive-modal-title-row">
            <span id="passive-modal-icon" class="passive-modal-icon" aria-hidden="true"></span>
            <span id="passive-modal-title">—</span>
          </div>
          <button type="button" class="passive-modal-x" id="passive-modal-close" aria-label="Закрыть">✕</button>
        </div>
        <div class="modal-body passive-modal-body--skill" id="passive-modal-body"></div>
      </div>
    </div>

    <div
      id="hidden-skill-modal"
      class="modal"
      style="display: none"
      onclick="if (event.target === this) WaifuApp.closeHiddenSkillModal()"
    >
      <div class="modal-content passive-skill-modal-panel" onclick="event.stopPropagation()">
        <div class="modal-head passive-modal-head--skill">
          <div class="modal-title passive-modal-title-row">
            <span id="hidden-skill-modal-title">—</span>
          </div>
          <button
            type="button"
            class="passive-modal-x"
            id="hidden-skill-modal-close"
            aria-label="Закрыть"
            onclick="WaifuApp.closeHiddenSkillModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body passive-modal-body--skill" id="hidden-skill-modal-body"></div>
      </div>
    </div>

    <nav class="nav basement">
      <a href="./profile.html" data-page="profile" title="Профиль"><span aria-hidden="true">👤</span></a>
      <a href="./dungeons.html" data-page="dungeons" title="Подземелья"><span aria-hidden="true">🏰</span></a>
      <a href="./shop.html" data-page="shop" title="Магазин"><span aria-hidden="true">🏪</span></a>
      <a href="./tavern.html" data-page="tavern" title="Таверна"><span aria-hidden="true">🍻</span></a>
      <a href="./caravan.html" data-page="caravan" title="Караван"><span aria-hidden="true">🐫</span></a>
      <a href="./guild_hall.html" data-page="guild" title="Гильдия"><span aria-hidden="true">🏛️</span></a>
      <a href="./training_hall.html" data-page="training" title="Тренировочный зал"><span aria-hidden="true">💪</span></a>
      <a href="./index.html" data-page="menu" title="Главное меню"><span aria-hidden="true">🏠</span></a>
    </nav>
  </body>
</html>
