apiVersion: apps/v1
kind: Deployment
metadata:
  name: waifu-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waifu-api
  template:
    metadata:
      labels:
        app: waifu-api
    spec:
      containers:
        - name: api
          image: waifu-bot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: waifu-bot-env
          env:
            - name: BACKGROUND_MODE
              value: worker
            - name: WORKER_ROLE
              value: api
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
